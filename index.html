<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem TV - HLS Oynatıcı</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-top: 0; text-shadow: 0 0 5px #00ff00; }

        .player-container {
            width: 90%;
            max-width: 1000px;
            background: #000;
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            height: auto;
            outline: none;
        }

        .episode-list {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 1000px;
        }

        .ep-btn {
            background-color: #161b22;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .ep-btn:hover, .ep-btn.active {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>

    <h1>> YAYIN_SISTEMI_AKTIF...</h1>

    <div class="player-container">
        <video id="tvPlayer" controls></video>
    </div>

    <div class="episode-list">
        <button class="ep-btn active" onclick="loadVideo(1, 'Https://s230.rapidrame.com/hls2/01/00026/cguiosk0yetc_,l,n,.urlset/index-f1-v1-a1.m3u8?t=fkmtUyD6t2OR6B9UTGx-3uKtkoWwPpEl2AfT9ok4qXk&s=1777921042&e=86400&f=133683&srv=s427&i=0.0&sp=0&p1=s230&p2=s230')">Bölüm 1</button>
        <button class="ep-btn" onclick="loadVideo(2, 'BURAYA_2_BOLUM_LINKI_GELECEK.m3u8')">Bölüm 2</button>
        <button class="ep-btn" onclick="loadVideo(3, 'BURAYA_3_BOLUM_LINKI_GELECEK.m3u8')">Bölüm 3</button>
    </div>

    <script>
        var video = document.getElementById('tvPlayer');
        var hls = new Hls(); // HLS motorunu tanımla

        function loadVideo(epNumber, videoUrl) {
            // Televizyon tarayıcısı hls.js destekliyorsa
            if (Hls.isSupported()) {
                hls.loadSource(videoUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // Bazı TV'ler (Apple TV veya yerleşik destekliler) m3u8'i direkt tanır
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }

            // Buton tasarımlarını (aktif olanı yeşil yap) güncelle
            var buttons = document.getElementsByClassName('ep-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            buttons[epNumber - 1].classList.add('active');
        }

        // Sayfa ilk açıldığında doğrudan 1. Bölümü (senin linki) otomatik yükle
        window.onload = function() {
            loadVideo(1, 'Https://s230.rapidrame.com/hls2/01/00026/cguiosk0yetc_,l,n,.urlset/index-f1-v1-a1.m3u8?t=fkmtUyD6t2OR6B9UTGx-3uKtkoWwPpEl2AfT9ok4qXk&s=1777921042&e=86400&f=133683&srv=s427&i=0.0&sp=0&p1=s230&p2=s230');
        };
    </script>

</body>
</html>
