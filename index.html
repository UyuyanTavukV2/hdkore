<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SistemHub - TV Oynatıcı</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0d0d;
            --terminal-gray: #1a1a1a;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--neon-green);
            width: 100%;
            max-width: 1000px;
            padding-bottom: 10px;
        }

        .season-title {
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .player-container {
            width: 95%;
            max-width: 1000px;
            background: #000;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border-radius: 8px;
            margin-bottom: 25px;
            /* Yükseklik veriyoruz ki siyah kutu çökmesin */
            min-height: 300px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            outline: none;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 95%;
            max-width: 1000px;
        }

        .ep-btn {
            background-color: var(--terminal-gray);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            border-radius: 4px;
        }

        .ep-btn:hover, .ep-btn.active {
            background-color: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .ep-btn:focus {
            outline: 2px solid #fff;
            background-color: var(--neon-green);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="season-title">> SYSTEMHUB // FALLOUT: S02 <</div>
    </div>

    <div class="player-container">
        <video id="mainPlayer" controls poster="https://via.placeholder.com/1000x560/000000/00FF41?text=SISTEM+YUKLENIYOR..."></video>
    </div>

    <div class="episode-grid">
        <button class="ep-btn active" onclick="loadRapid('4', 'https://s230.rapidrame.com/hls2/01/00026/cguiosk0yetc_,l,n,.urlset/index-f1-v1-a1.m3u8?t=fkmtUyD6t2OR6B9UTGx-3uKtkoWwPpEl2AfT9ok4qXk&s=1777921042&e=86400&f=133683&srv=s427&i=0.0&sp=0&p1=s230&p2=s230', this)">Bölüm 04</button>
        <button class="ep-btn" onclick="loadRapid('5', 'BURAYA_BOLUM_5_LINKINI_YAPISTIR', this)">Bölüm 05</button>
        <button class="ep-btn" onclick="loadRapid('6', 'BURAYA_BOLUM_6_LINKINI_YAPISTIR', this)">Bölüm 06</button>
        <button class="ep-btn" onclick="loadRapid('7', 'BURAYA_BOLUM_7_LINKINI_YAPISTIR', this)">Bölüm 07</button>
        <button class="ep-btn" onclick="loadRapid('8', 'BURAYA_BOLUM_8_LINKINI_YAPISTIR', this)">Bölüm 08 (Final)</button>
    </div>

    <script>
        var video = document.getElementById('mainPlayer');
        var hls = null;

        function loadRapid(id, url, btnElement) {
            if (url.includes('BURAYA_')) {
                alert('Hata: Önce linki koda eklemelisin!');
                return;
            }

            console.log('Sistem: Bölüm ' + id + ' yükleniyor...');

            // Televizyonun kendi m3u8 desteği varsa ÖNCE onu kullan (Samsunglar için en iyisi)
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.load();
                video.play().catch(function(e) { console.log("Otomatik oynatma engellendi, manuel başlatın."); });
            } 
            // Yoksa HLS.js motorunu devreye sok
            else if (Hls.isSupported()) {
                if (hls) { hls.destroy(); }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function(e) { console.log("Manuel başlatın."); });
                });
            }

            // Aktif buton rengi
            if (btnElement) {
                var btns = document.querySelectorAll('.ep-btn');
                for (var i = 0; i < btns.length; i++) {
                    btns[i].classList.remove('active');
                }
                btnElement.classList.add('active');
            }
        }

        // Sayfa açılınca 4. bölümü yükle
        window.onload = function() {
            var firstBtn = document.querySelector('.ep-btn');
            firstBtn.click();
        };
    </script>

</body>
</html>
