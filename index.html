<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem TV - Fallout S02</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0d0d;
            --terminal-gray: #1a1a1a;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--neon-green);
            width: 100%;
            max-width: 1000px;
            padding-bottom: 10px;
        }

        .season-title {
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .player-container {
            width: 95%;
            max-width: 1000px;
            background: #000;
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        video {
            width: 100%;
            display: block;
        }

        .controls-info {
            font-size: 14px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 95%;
            max-width: 1000px;
        }

        .ep-btn {
            background-color: var(--terminal-gray);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .ep-btn:hover, .ep-btn.active {
            background-color: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* TV Kumandası ile seçim yaparken kolaylık sağlar */
        .ep-btn:focus {
            outline: 3px solid #fff;
            background-color: var(--neon-green);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="season-title">> FALLOUT: SEASON 02 <</div>
        <div class="status">DURUM: SISTEM_CEVRIMICI // BOLUM_SECINIZ</div>
    </div>

    <div class="player-container">
        <video id="mainPlayer" controls poster="https://via.placeholder.com/1000x560/000000/00FF41?text=SISTEM+HAZIR"></video>
    </div>

    <div class="controls-info">İpucu: TV kumandasıyla butonların üzerine gelip OK tuşuna basınız.</div>

    <div class="episode-grid">
        <button class="ep-btn" onclick="loadRapid('4', 'BURAYA_BOLUM_4_LINKINI_YAPISTIR')">Bölüm 04</button>
        <button class="ep-btn" onclick="loadRapid('5', 'BURAYA_BOLUM_5_LINKINI_YAPISTIR')">Bölüm 05</button>
        <button class="ep-btn" onclick="loadRapid('6', 'BURAYA_BOLUM_6_LINKINI_YAPISTIR')">Bölüm 06</button>
        <button class="ep-btn" onclick="loadRapid('7', 'BURAYA_BOLUM_7_LINKINI_YAPISTIR')">Bölüm 07</button>
        <button class="ep-btn" onclick="loadRapid('8', 'BURAYA_BOLUM_8_LINKINI_YAPISTIR')">Bölüm 08 (Final)</button>
    </div>

    <script>
        var video = document.getElementById('mainPlayer');
        var hls = new Hls();

        function loadRapid(id, url) {
            if (url.includes('BURAYA_')) {
                alert('Hata: Önce yakaladığın linki koda eklemelisin!');
                return;
            }

            console.log('Sistem: Bölüm ' + id + ' yükleniyor...');
            
            if (Hls.isSupported()) {
                hls.destroy(); // Eski yayını temizle
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }

            // Aktif buton görseli
            var btns = document.querySelectorAll('.ep-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>

</body>
</html>
