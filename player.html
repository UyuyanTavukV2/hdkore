<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Player</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050507;
font-family:Inter;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* PLAYER CONTAINER */

.player{
width:900px;
max-width:95%;
background:#0f0f14;
border-radius:16px;
overflow:hidden;
box-shadow:0 20px 80px rgba(0,0,0,0.8);
position:relative;
}

/* VIDEO */

video{
width:100%;
display:block;
background:black;
}

/* CONTROLS */

.controls{
position:absolute;
bottom:0;
left:0;
right:0;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
display:flex;
flex-direction:column;
gap:12px;
opacity:0;
transition:.3s;
}

.player:hover .controls{
opacity:1;
}

/* PROGRESS */

.progress{
width:100%;
height:6px;
background:#333;
border-radius:20px;
cursor:pointer;
}

.progress-bar{
height:100%;
width:0%;
background:#f0c060;
border-radius:20px;
}

/* BUTTONS */

.buttons{
display:flex;
align-items:center;
justify-content:space-between;
}

.left,
.right{
display:flex;
align-items:center;
gap:12px;
}

button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
padding:6px;
transition:.2s;
}

button:hover{
transform:scale(1.2);
color:#f0c060;
}

/* VOLUME */

.volume{
width:90px;
}

/* TIME */

.time{
font-size:13px;
opacity:.8;
}

/* CENTER PLAY */

.center-play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
background:rgba(0,0,0,.6);
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
cursor:pointer;
transition:.3s;
}

.center-play:hover{
transform:translate(-50%,-50%) scale(1.1);
}

.hide{
opacity:0;
pointer-events:none;
}

</style>
</head>

<body>

<div class="player" id="player">

<video id="video">
<source src="video.mp4" type="video/mp4">
</video>

<div class="center-play" id="centerPlay">
▶
</div>

<div class="controls" id="controls">

<div class="progress" id="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="buttons">

<div class="left">

<button id="play">▶</button>

<button id="back">⏪</button>

<button id="forward">⏩</button>

<input type="range" min="0" max="1" step="0.01" class="volume" id="volume">

<span class="time" id="time">0:00 / 0:00</span>

</div>

<div class="right">

<button id="fit">⛶</button>

<button id="fullscreen">⛶⛶</button>

</div>

</div>
</div>

</div>

<script>

const video = document.getElementById("video")
const play = document.getElementById("play")
const centerPlay = document.getElementById("centerPlay")

const progress = document.getElementById("progress")
const progressBar = document.getElementById("progressBar")

const volume = document.getElementById("volume")
const time = document.getElementById("time")

const back = document.getElementById("back")
const forward = document.getElementById("forward")

const fullscreen = document.getElementById("fullscreen")
const fit = document.getElementById("fit")

/* PLAY */

function togglePlay(){

if(video.paused){
video.play()
centerPlay.classList.add("hide")
play.textContent="⏸"
}else{
video.pause()
centerPlay.classList.remove("hide")
play.textContent="▶"
}

}

play.onclick=togglePlay
centerPlay.onclick=togglePlay
video.onclick=togglePlay

/* PROGRESS */

video.addEventListener("timeupdate",()=>{

const percent=(video.currentTime/video.duration)*100
progressBar.style.width=percent+"%"

let current=format(video.currentTime)
let duration=format(video.duration)

time.textContent=current+" / "+duration

})

progress.onclick=e=>{

const pos=e.offsetX/progress.offsetWidth
video.currentTime=pos*video.duration

}

/* TIME FORMAT */

function format(sec){

if(!sec) return "0:00"

let m=Math.floor(sec/60)
let s=Math.floor(sec%60)

if(s<10)s="0"+s

return m+":"+s

}

/* VOLUME */

volume.oninput=()=>{

video.volume=volume.value

}

/* SKIP */

back.onclick=()=>video.currentTime-=10
forward.onclick=()=>video.currentTime+=10

/* FULLSCREEN */

fullscreen.onclick=()=>{

if(!document.fullscreenElement){
player.requestFullscreen()
}else{
document.exitFullscreen()
}

}

/* FIT MODE */

let fitMode=true

fit.onclick=()=>{

if(fitMode){
video.style.objectFit="cover"
}else{
video.style.objectFit="contain"
}

fitMode=!fitMode

}

/* DEVTOOLS BLOCK */

document.addEventListener("contextmenu",e=>e.preventDefault())

document.onkeydown=function(e){

if(e.key==="F12") return false

if(e.ctrlKey && e.shiftKey && e.key==="I") return false

if(e.ctrlKey && e.key==="U") return false

}

</script>

</body>
</html>
