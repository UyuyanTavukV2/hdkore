<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiç Ezilmeyen, Daima Üstat — Player</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-bright: #f0c060;
    --dark: #0a0a0c;
    --darker: #050507;
    --surface: #111115;
    --surface2: #1a1a20;
    --text: #e8e0d0;
    --text-dim: #888070;
  }

  html, body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(201,168,76,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 20% 80%, rgba(80,50,120,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 980px;
    padding: 40px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Title */
  .title-block {
    text-align: center;
    animation: fadeDown 0.8s ease both;
  }

  .title-block .label {
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    opacity: 0.8;
  }

  .title-block h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 3.5vw, 32px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
    line-height: 1.3;
  }

  .title-block h1 span {
    color: var(--gold);
  }

  .title-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 14px auto 0;
    opacity: 0.6;
  }

  /* Player container */
  .player-container {
    width: 100%;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.15),
      0 30px 80px rgba(0,0,0,0.7),
      0 0 120px rgba(201,168,76,0.04);
    animation: fadeUp 0.9s 0.2s ease both;
  }

  /* Corner accents */
  .player-container::before,
  .player-container::after {
    content: '';
    position: absolute;
    width: 30px;
    height: 30px;
    z-index: 10;
    pointer-events: none;
  }
  .player-container::before {
    top: 0; left: 0;
    border-top: 2px solid var(--gold);
    border-left: 2px solid var(--gold);
    opacity: 0.7;
  }
  .player-container::after {
    bottom: 60px; right: 0;
    border-bottom: 2px solid var(--gold);
    border-right: 2px solid var(--gold);
    opacity: 0.7;
  }

  /* Video wrapper */
  .video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    cursor: pointer;
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }

  /* Center play overlay */
  .center-play {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.45);
    opacity: 1;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .center-play.hidden { opacity: 0; }

  .center-play-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,12,0.6);
    backdrop-filter: blur(8px);
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .center-play-btn svg { width: 30px; height: 30px; fill: var(--gold); margin-left: 5px; }

  /* Buffering spinner */
  .buffering {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .buffering.active { display: flex; }
  .spin {
    width: 44px; height: 44px;
    border: 3px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* Controls bar */
  .controls {
    background: linear-gradient(180deg, rgba(10,10,12,0) 0%, rgba(5,5,7,0.98) 100%);
    padding: 16px 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  /* Fullscreen overlay controls */
  :fullscreen .player-container,
  :-webkit-full-screen .player-container {
    border-radius: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  :fullscreen .video-wrapper,
  :-webkit-full-screen .video-wrapper {
    flex: 1;
    aspect-ratio: unset;
    height: auto;
  }
  :fullscreen .controls,
  :-webkit-full-screen .controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 28px 20px;
    background: linear-gradient(0deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
    z-index: 50;
  }
  :fullscreen .player-container.hide-controls .controls,
  :-webkit-full-screen .player-container.hide-controls .controls {
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
  }
  :fullscreen .player-container.hide-controls,
  :-webkit-full-screen .player-container.hide-controls {
    cursor: none;
  }

  /* Progress bar */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .time-label {
    font-size: 11px;
    font-family: 'Raleway', sans-serif;
    font-weight: 500;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 80px;
    text-align: right;
    letter-spacing: 0.5px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
    transition: height 0.15s ease;
  }
  .progress-track:hover { height: 6px; }

  .progress-buffered {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: rgba(201,168,76,0.2);
    border-radius: 2px;
    transition: width 0.2s;
  }

  .progress-fill {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-bright));
    border-radius: 2px;
    transition: width 0.05s linear;
  }

  .progress-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold-bright);
    box-shadow: 0 0 8px rgba(240,192,96,0.6);
    transition: transform 0.15s ease;
    pointer-events: none;
  }
  .progress-track:hover .progress-thumb { transform: translate(-50%, -50%) scale(1); }

  /* Buttons row */
  .btn-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 7px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    color: var(--text-dim);
  }
  .ctrl-btn:hover { background: rgba(201,168,76,0.1); color: var(--gold); transform: scale(1.08); }
  .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }
  .ctrl-btn.active { color: var(--gold); }

  .spacer { flex: 1; }

  /* Volume */
  .volume-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
    outline: none;
    cursor: pointer;
    background-image: linear-gradient(var(--gold), var(--gold));
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold-bright);
    box-shadow: 0 0 6px rgba(240,192,96,0.5);
    cursor: pointer;
  }

  /* Speed selector */
  .speed-btn {
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .speed-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Keyboard hints */
  .hints {
    text-align: center;
    font-size: 10px;
    font-family: 'Raleway', sans-serif;
    color: rgba(255,255,255,0.18);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    animation: fadeUp 1s 0.5s ease both;
  }
  .hints kbd {
    display: inline-block;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 2px;
    padding: 1px 5px;
    font-family: inherit;
    margin: 0 2px;
  }

  /* File upload overlay */
  .upload-overlay {
    position: absolute;
    inset: 0;
    background: rgba(5,5,7,0.96);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 20;
    transition: opacity 0.4s ease;
  }
  .upload-overlay.gone { opacity: 0; pointer-events: none; }

  .upload-icon { opacity: 0.4; }
  .upload-icon svg { width: 60px; height: 60px; fill: var(--gold); }

  .upload-text {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-align: center;
  }

  .upload-btn {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 12px 30px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .upload-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
    z-index: -1;
  }
  .upload-btn:hover { color: var(--dark); }
  .upload-btn:hover::before { transform: scaleX(1); }

  .upload-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }

  /* Notification toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(10,10,12,0.92);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-size: 12px;
    font-family: 'Raleway', sans-serif;
    letter-spacing: 1px;
    padding: 10px 24px;
    border-radius: 2px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Drag over */
  .video-wrapper.dragover::after {
    content: 'Bırak';
    position: absolute;
    inset: 0;
    background: rgba(201,168,76,0.15);
    border: 2px dashed var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 24px;
    color: var(--gold);
    z-index: 25;
  }
</style>
</head>
<body>

<div class="page-wrap">

  <div class="title-block">
    <div class="label">◆ Şimdi Oynatılıyor ◆</div>
    <h1 id="videoTitle">Hiç Ezilmeyen, <span>Daima Üstat</span></h1>
    <div class="title-divider"></div>
  </div>

  <div class="player-container" id="playerContainer">
    <div class="video-wrapper" id="videoWrapper">
      <video id="video" preload="metadata"></video>

      <!-- Center play/pause overlay -->
      <div class="center-play" id="centerPlay">
        <div class="center-play-btn">
          <svg id="centerIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>

      <!-- Buffering -->
      <div class="buffering" id="buffering"><div class="spin"></div></div>

      <!-- Upload overlay -->
      <div class="upload-overlay" id="uploadOverlay">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24"><path d="M18 15v3H6v-3H4v3c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-3h-2zm-1-4l-1.41-1.41L13 12.17V4h-2v8.17L8.41 9.59 7 11l5 5 5-5z"/></svg>
        </div>
        <div class="upload-text">Video dosyasını seç veya sürükle</div>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Dosya Seç</button>
        <div class="upload-hint">MP4 · MKV · WEBM · AVI desteklenir</div>
        <input type="file" id="fileInput" accept="video/*" style="display:none">
      </div>
    </div>

    <div class="controls">
      <!-- Progress -->
      <div class="progress-row">
        <div class="progress-track" id="progressTrack">
          <div class="progress-buffered" id="progressBuffered"></div>
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <div class="time-label" id="timeLabel">0:00 / 0:00</div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <!-- Play/Pause -->
        <button class="ctrl-btn" id="playBtn" title="Oynat/Durdur (Boşluk)">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <!-- Skip back 10s -->
        <button class="ctrl-btn" onclick="skip(-10)" title="-10 saniye">
          <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8zm-1.1 11H10v-3.26L9 13.12V12.2l1.85-.63h.05V16zm4.28-1.65c0 1.07-.36 1.75-1.11 1.75-.74 0-1.1-.68-1.1-1.75v-.76c0-1.07.36-1.75 1.1-1.75.75 0 1.11.68 1.11 1.75v.76zm-.74-.82c0-.55-.12-.9-.37-.9s-.37.35-.37.9v.88c0 .55.12.9.37.9s.37-.35.37-.9v-.88z"/></svg>
        </button>

        <!-- Skip forward 10s -->
        <button class="ctrl-btn" onclick="skip(10)" title="+10 saniye">
          <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8zm-1.1 11H10v-3.26L9 13.12V12.2l1.85-.63h.05V16zm4.28-1.65c0 1.07-.36 1.75-1.11 1.75-.74 0-1.1-.68-1.1-1.75v-.76c0-1.07.36-1.75 1.1-1.75.75 0 1.11.68 1.11 1.75v.76zm-.74-.82c0-.55-.12-.9-.37-.9s-.37.35-.37.9v.88c0 .55.12.9.37.9s.37-.35.37-.9v-.88z"/></svg>
        </button>

        <!-- Volume -->
        <div class="volume-group">
          <button class="ctrl-btn" id="muteBtn" title="Sessiz (M)" onclick="toggleMute()">
            <svg id="volumeIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          </button>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1">
        </div>

        <div class="spacer"></div>

        <!-- Speed -->
        <button class="speed-btn" id="speedBtn" onclick="cycleSpeed()">1×</button>

        <!-- Fullscreen -->
        <button class="ctrl-btn" id="fsBtn" title="Tam Ekran (F)">
          <svg id="fsIcon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="hints">
    <kbd>Boşluk</kbd> Oynat/Dur &nbsp;·&nbsp; <kbd>F</kbd> Tam Ekran &nbsp;·&nbsp; <kbd>M</kbd> Ses &nbsp;·&nbsp; <kbd>←</kbd><kbd>→</kbd> 10s
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const video = document.getElementById('video');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const centerPlay = document.getElementById('centerPlay');
const centerIcon = document.getElementById('centerIcon');
const progressTrack = document.getElementById('progressTrack');
const progressFill = document.getElementById('progressFill');
const progressBuffered = document.getElementById('progressBuffered');
const progressThumb = document.getElementById('progressThumb');
const timeLabel = document.getElementById('timeLabel');
const volumeSlider = document.getElementById('volumeSlider');
const volumeIcon = document.getElementById('volumeIcon');
const speedBtn = document.getElementById('speedBtn');
const fsBtn = document.getElementById('fsBtn');
const fsIcon = document.getElementById('fsIcon');
const fileInput = document.getElementById('fileInput');
const uploadOverlay = document.getElementById('uploadOverlay');
const buffering = document.getElementById('buffering');
const videoWrapper = document.getElementById('videoWrapper');
const playerContainer = document.getElementById('playerContainer');

const PLAY_PATH = "M8 5v14l11-7z";
const PAUSE_PATH = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";
const VOL_ON = "M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z";
const VOL_OFF = "M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z";
const FS_IN = "M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z";
const FS_OUT = "M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z";

let speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIdx = 2;
let isDragging = false;

function updateTitle(name) {
  const clean = name.replace(/\.[^/.]+$/, '');
  const mid = Math.floor(clean.length / 2);
  // Find a good split point (space near middle)
  let split = clean.lastIndexOf(' ', mid);
  if (split < 2) split = clean.indexOf(' ', mid);
  const titleEl = document.getElementById('videoTitle');
  if (split > 0 && split < clean.length - 2) {
    titleEl.innerHTML = clean.slice(0, split) + ', <span>' + clean.slice(split + 1) + '</span>';
  } else {
    titleEl.innerHTML = '<span>' + clean + '</span>';
  }
  document.title = clean + ' — Player';
}

// ── Auto-load MP4 from same folder ──────────────────────────────────────────
// Video dosyası player.html ile aynı klasörde olmalı, adı aşağıdaki gibi:
const AUTO_VIDEO = 'Hiç Ezilmeyen, Daima Üstat(Dublajlı).mp4';
(function autoLoad() {
  const src = AUTO_VIDEO;
  video.src = src;
  updateTitle(AUTO_VIDEO);
  video.addEventListener('loadedmetadata', () => {
    uploadOverlay.classList.add('gone');
  }, { once: true });
  video.addEventListener('error', () => {
    // Dosya bulunamazsa upload ekranı göster
    uploadOverlay.classList.remove('gone');
  }, { once: true });
})();

// ── Fullscreen auto-hide controls ───────────────────────────────────────────
let hideTimer = null;

function showControls() {
  playerContainer.classList.remove('hide-controls');
  clearTimeout(hideTimer);
  if (document.fullscreenElement) {
    hideTimer = setTimeout(() => {
      if (!video.paused) playerContainer.classList.add('hide-controls');
    }, 3000);
  }
}

document.addEventListener('fullscreenchange', () => {
  const isFS = !!document.fullscreenElement;
  fsIcon.setAttribute('d', isFS ? FS_OUT : FS_IN);
  if (!isFS) {
    clearTimeout(hideTimer);
    playerContainer.classList.remove('hide-controls');
  } else {
    showControls();
  }
});

playerContainer.addEventListener('mousemove', showControls);
playerContainer.addEventListener('mouseleave', () => {
  if (document.fullscreenElement && !video.paused) {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => playerContainer.classList.add('hide-controls'), 1000);
  }
});

// Pause olunca her zaman kontrolleri göster
video.addEventListener('pause', () => {
  clearTimeout(hideTimer);
  playerContainer.classList.remove('hide-controls');
});

// File input
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});

function loadFile(file) {
  const url = URL.createObjectURL(file);
  video.src = url;
  uploadOverlay.classList.add('gone');
  updateTitle(file.name);
  toast(`▶ ${file.name.replace(/\.[^/.]+$/, '').substring(0, 40)}`);
}

// Drag & drop
videoWrapper.addEventListener('dragover', e => { e.preventDefault(); videoWrapper.classList.add('dragover'); });
videoWrapper.addEventListener('dragleave', () => videoWrapper.classList.remove('dragover'));
videoWrapper.addEventListener('drop', e => {
  e.preventDefault();
  videoWrapper.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) loadFile(file);
});

// Play/pause toggle
function togglePlay() {
  if (!video.src) { document.getElementById('fileInput').click(); return; }
  if (video.paused) video.play();
  else video.pause();
}

video.addEventListener('play', () => {
  playIcon.setAttribute('d', PAUSE_PATH);
  centerIcon.setAttribute('d', PAUSE_PATH);
  centerPlay.classList.add('hidden');
});
video.addEventListener('pause', () => {
  playIcon.setAttribute('d', PLAY_PATH);
  centerIcon.setAttribute('d', PLAY_PATH);
  centerPlay.classList.remove('hidden');
});

playBtn.addEventListener('click', togglePlay);
videoWrapper.addEventListener('click', (e) => {
  if (e.target === fileInput || uploadOverlay.contains(e.target)) return;
  if (!uploadOverlay.classList.contains('gone')) return;
  togglePlay();
});

// Progress
video.addEventListener('timeupdate', updateProgress);
video.addEventListener('progress', updateBuffered);
video.addEventListener('loadedmetadata', updateProgress);

function updateProgress() {
  if (!video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  timeLabel.textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
}

function updateBuffered() {
  if (!video.duration || !video.buffered.length) return;
  const b = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
  progressBuffered.style.width = b + '%';
}

// Seek
progressTrack.addEventListener('mousedown', e => {
  isDragging = true;
  seek(e);
});
document.addEventListener('mousemove', e => { if (isDragging) seek(e); });
document.addEventListener('mouseup', () => { isDragging = false; });

function seek(e) {
  const rect = progressTrack.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  video.currentTime = ratio * video.duration;
}

// Volume
volumeSlider.addEventListener('input', () => {
  video.volume = parseFloat(volumeSlider.value);
  video.muted = video.volume === 0;
  updateVolumeIcon();
  volumeSlider.style.backgroundSize = (video.volume * 100) + '% 100%';
});

function toggleMute() {
  video.muted = !video.muted;
  if (video.muted) {
    volumeSlider.value = 0;
    volumeSlider.style.backgroundSize = '0% 100%';
  } else {
    volumeSlider.value = video.volume;
    volumeSlider.style.backgroundSize = (video.volume * 100) + '% 100%';
  }
  updateVolumeIcon();
}

function updateVolumeIcon() {
  volumeIcon.setAttribute('d', (video.muted || video.volume === 0) ? VOL_OFF : VOL_ON);
}

// Speed
function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  video.playbackRate = speeds[speedIdx];
  const s = speeds[speedIdx];
  speedBtn.textContent = s === 1 ? '1×' : s + '×';
  toast('Hız: ' + speedBtn.textContent);
}

// Skip
function skip(sec) {
  video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + sec));
  toast((sec > 0 ? '+' : '') + sec + 's');
}

// Fullscreen
fsBtn.addEventListener('click', toggleFS);
function toggleFS() {
  if (!document.fullscreenElement) {
    playerContainer.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const isFS = !!document.fullscreenElement;
  fsIcon.setAttribute('d', isFS ? FS_OUT : FS_IN);
});

// Buffering indicator
video.addEventListener('waiting', () => buffering.classList.add('active'));
video.addEventListener('playing', () => buffering.classList.remove('active'));
video.addEventListener('canplay', () => buffering.classList.remove('active'));

// Keyboard
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  switch(e.key) {
    case ' ': case 'k': e.preventDefault(); togglePlay(); break;
    case 'f': case 'F': toggleFS(); break;
    case 'm': case 'M': toggleMute(); break;
    case 'ArrowLeft': e.preventDefault(); skip(-10); break;
    case 'ArrowRight': e.preventDefault(); skip(10); break;
    case 'ArrowUp': e.preventDefault();
      video.volume = Math.min(1, video.volume + 0.1);
      volumeSlider.value = video.volume;
      volumeSlider.style.backgroundSize = (video.volume * 100) + '% 100%';
      toast('Ses: ' + Math.round(video.volume * 100) + '%'); break;
    case 'ArrowDown': e.preventDefault();
      video.volume = Math.max(0, video.volume - 0.1);
      volumeSlider.value = video.volume;
      volumeSlider.style.backgroundSize = (video.volume * 100) + '% 100%';
      toast('Ses: ' + Math.round(video.volume * 100) + '%'); break;
  }
});

// Toast
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// Time formatter
function fmt(s) {
  if (isNaN(s)) return '0:00';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${sec}` : `${m}:${sec}`;
}
</script>
